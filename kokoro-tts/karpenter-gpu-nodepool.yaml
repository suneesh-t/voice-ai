apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-kokoro-tts
spec:
  weight: 50
  template:
    metadata:
      labels:
        ray.io/node-type: gpu-worker
        workload: kokoro-tts
    spec:
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: default
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["g6.xlarge", "g6.2xlarge", "g5.xlarge"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
      taints:
        - key: nvidia.com/gpu
          value: "true"
          effect: NoSchedule
      expireAfter: 336h
      terminationGracePeriod: 24h
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 300s
    budgets:
      - nodes: "10%"
  limits:
    cpu: "24"
    memory: "96Gi"
    nvidia.com/gpu: "3"
