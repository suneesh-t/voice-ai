apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-g6-whisper
spec:
  weight: 50
  template:
    metadata:
      labels:
        ray.io/node-type: gpu-worker
        workload: whisper-v3-turbo
    spec:
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: default
      taints:
        - key: nvidia.com/gpu
          value: "true"
          effect: NoSchedule
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - "g6e.xlarge"
            - "g6e.2xlarge"
            - "g6.xlarge"
            - "g5.xlarge"
      expireAfter: 336h
      terminationGracePeriod: 24h
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 300s
    budgets:
      - nodes: "10%"
  limits:
    cpu: "32"
    memory: "128Gi"
    nvidia.com/gpu: "4"
